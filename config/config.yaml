# ============================================================
# Configuration du pipeline BEAC RAG
# Les secrets/chemins machine sont dans .env (voir .env.example)
# ============================================================

project:
  name: "BEAC RAG Chatbot"
  language: "fr"   # langue principale des reponses

# ---- Ingestion ----
ingestion:
  # Extensions traitees
  pdf_extensions: [".pdf"]
  excel_extensions: [".xls", ".xlsx"]
  # OCR : seuil de caracteres natifs en-dessous duquel on bascule en OCR
  ocr_text_threshold: 100
  ocr_dpi: 200           # 200 DPI suffit et 2x plus rapide
  ocr_workers: 0         # 0 = auto (cpu_count // 2). Parallelise l'OCR page par page.
  image_extract_dir: "data/extracted_images"  # ou null pour desactiver
  # Nombre de fichiers traites par lot (memoire)
  batch_size: 20

# ---- Chunking ----
chunking:
  chunk_size: 500       # tokens approx par chunk (moins de chunks)
  chunk_overlap: 90
  min_chunk_chars: 50    # ignore les chunks trop courts

# ---- Embeddings ----
embeddings:
  model: "BAAI/bge-m3"
  device: "cpu"
  dimension: 1024        # dimension de bge-m3
  batch_size: 64         # batch plus gros = meilleure saturation CPU
  normalize: true

# ---- Vector store (pgvector) ----
vector_store:
  table: "chunks"
  index_type: "hnsw"     # hnsw (rapide) ou ivfflat
  hnsw_m: 16
  hnsw_ef_construction: 64
  distance: "cosine"     # cosine | l2 | ip

# ---- Retrieval ----
retrieval:
  top_k: 10              # chunks vectoriels retournes
  sql_max_rows: 50       # lignes max d'une requete SQL stats
  min_similarity: 0.3    # seuil de pertinence

# ---- LLM ----
llm:
  provider: "ollama"
  model: "llama3.1:8b-instruct-q4_K_M"
  temperature: 0.1
  num_ctx: 4096
  max_tokens: 1024
  keep_alive: "1h"       # garde le modele en RAM

# ---- Query router ----
router:
  # Mots-cles qui suggerent une question "donnees chiffrees" (-> SQL)
  data_keywords:
    - taux
    - inflation
    - masse monetaire
    - reserves
    - statistique
    - montant
    - valeur
    - evolution
    - combien
    - chiffre
    - pourcentage
    - balance
    - emission
