services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: beac_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beac_password}
      POSTGRES_DB: ${POSTGRES_DB:-beac_rag}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "work_mem=128MB"
      - "-c"
      - "maintenance_work_mem=1GB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beac} -d ${POSTGRES_DB:-beac_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: beac_pgdata
